name: 同步上游 GitHub 仓库
on:
  push:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:
  watch:
    types: [started]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config --global user.name "robert34"
          git config --global user.email "lfyuuanwuqu@163.com"

      - name: 拉取完整仓库
        run: git pull --unshallow

      - name: 同步上游代码
        run: |
          git remote add upstream https://github.com/6dylan6/jdpro.git || true
          git fetch upstream
          git checkout main
          git merge --no-edit upstream/main
          git push origin main
          git fetch upstream --tags
          git push --tags
